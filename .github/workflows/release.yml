name: Release

# Triggered by pushing a version tag (e.g. `git push origin v0.3.0`).
# Creates a GitHub Release using the matching ## section from
# CHANGELOG.md as the body, and attaches the built sdist + wheel.
#
# Manual trigger via "Run workflow" still works — useful when a tag was
# pushed before this file existed (in which case nothing fired) and the
# release needs to be created retroactively.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true
        default: ""

permissions:
  contents: write   # needed for creating Releases

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          tag="${{ steps.tag.outputs.ref }}"
          version="${tag#v}"
          python - <<'PY' "$version" > release_notes.md
          import sys, re, pathlib
          version = sys.argv[1]
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Match the section "## [<version>]" up to the next "## [" or EOF
          pattern = re.compile(
              rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)",
              re.DOTALL,
          )
          m = pattern.search(text)
          if m:
              sys.stdout.write(m.group(1).strip() + "\n")
          else:
              sys.stdout.write(
                  f"Release {version} — see CHANGELOG.md for the full history.\n",
              )
          PY

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz
