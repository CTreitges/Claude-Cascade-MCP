name: Release

# Triggered by pushing a version tag (e.g. `git push origin v0.3.0`).
# Creates a GitHub Release using the matching `## [<version>]` section
# from CHANGELOG.md as the body, with the built sdist + wheel attached.
#
# `workflow_dispatch` is the manual fallback — useful when a tag was
# pushed before this file existed (then nothing fired automatically),
# or when re-cutting a release after a CHANGELOG fix.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true
        default: ""

permissions:
  contents: write   # required by softprops/action-gh-release

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            ref="${{ github.event.inputs.tag }}"
          else
            ref="${GITHUB_REF#refs/tags/}"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$ref version=${ref#v}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
          ls -la dist/

      - name: Extract release notes from CHANGELOG.md
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          python <<'PY'
          import os, re, pathlib
          version = os.environ["VERSION"]
          src = pathlib.Path("CHANGELOG.md")
          out = pathlib.Path("release_notes.md")
          fallback = (
              f"Release {version} — see CHANGELOG.md for the full history.\n"
          )
          if not src.is_file():
              out.write_text(fallback, encoding="utf-8")
              print("CHANGELOG.md missing, using fallback")
              raise SystemExit(0)
          text = src.read_text(encoding="utf-8")
          pattern = re.compile(
              rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)",
              re.DOTALL,
          )
          m = pattern.search(text)
          if m:
              body = m.group(1).strip() + "\n"
              out.write_text(body, encoding="utf-8")
              print(f"Wrote {len(body)} chars to release_notes.md")
          else:
              out.write_text(fallback, encoding="utf-8")
              print(f"No '## [{version}]' section in CHANGELOG.md, using fallback")
          PY
          echo "--- release_notes.md head ---"
          head -20 release_notes.md
          echo "--- end ---"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            dist/*.whl
            dist/*.tar.gz
