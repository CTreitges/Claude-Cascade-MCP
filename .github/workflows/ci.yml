name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"          # also run CI on tag pushes so a release never
                      # ships from a red build
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -q --tb=short

      - name: Verify entry points are importable
        run: |
          python -c "import bot; bot.main"
          python -c "import mcp_server; mcp_server.main"
          python -c "from cascade.core import run_cascade; print('core ok')"
